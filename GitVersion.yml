workflow: GitFlow/v1

next-version: 1.0.0
tag-prefix: 'v'

branches:
  release:
    regex: '^release[/-]'
    label: 'rc'
    increment: Minor
    source-branches: ['main', 'develop']
    is-release-branch: true

  hotfix:
    regex: '^hotfix[/-]'
    label: 'hotfix'
    increment: Patch
    source-branches: ['main', 'release']
    is-release-branch: false

  feature:
    regex: '^feature[/-]'
    label: 'alpha'
    increment: Minor
    source-branches: ['main', 'develop', 'release']

  pull-request:
    regex: '^(pull|pull\-requests|pr)[/-]'
    label: 'pr'
    increment: Inherit
    source-branches: ['feature', 'hotfix', 'main']

  develop:
    regex: '^develop$'
    label: 'beta'
    increment: Minor
    source-branches: []

assembly-versioning-scheme: MajorMinorPatch
assembly-file-versioning-format: '{Major}.{Minor}.{Patch}.{env:GITHUB_RUN_NUMBER ?? 0}'
commit-message-incrementing: Enabled
major-version-bump-message: '\+semver:\s?(breaking|major)'
minor-version-bump-message: '\+semver:\s?(feature|minor)'
patch-version-bump-message: '\+semver:\s?(fix|patch)'
no-bump-message: '\+semver:\s?(none|skip)'
